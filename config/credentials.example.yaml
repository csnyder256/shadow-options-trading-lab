# Copy to config/credentials.local.yaml (gitignored) and fill in your own keys.
# EVERY block is optional and every consumer fails OPEN: a missing file, a missing
# block, or an empty string simply disables that data source. Nothing here is
# required to run the test suite.
#
# Consumers (grep these paths to confirm):
#   alpaca    -> atlas/collect/intraday_data.py, atlas/collect/benzinga_news.py,
#                scripts/harvest_inplay_days.py
#   finnhub   -> scripts/news_tap.py, scripts/refresh_earnings_calendar.py
#   fred      -> atlas/options/events.py (falls back to hardcoded release tables)
#   sam_gov   -> atlas/collect/catalysts.py  (US-government SAM.gov procurement API)
#   crew      -> atlas/crew/providers.py, scripts/research_crew.py

alpaca:
  api_key: "your-alpaca-key-id-here"        # paper key id; IEX 1-minute bar cache + Benzinga news
  secret_key: "your-alpaca-secret-key-here"

finnhub:
  api_key: "your-finnhub-key-here"          # earnings calendar + company news

fred:
  api_key: "your-fred-key-here"             # CPI/NFP release dates; absent -> hardcoded fallback

sam_gov:
  api_key: "your-sam-gov-key-here"          # SAM.gov award notices (US government procurement API)

# Premarket research crew. Only providers with a non-empty <name>_api_key are built;
# zero configured providers is a normal outcome (empty hunt list), not an error.
crew:
  openrouter_api_key: "sk-or-v1-your-openrouter-key-here"
  groq_api_key: "gsk_your-groq-key-here"
  cerebras_api_key: "csk-your-cerebras-key-here"
  gemini_api_key: "your-google-gemini-key-here"
  zai_api_key: "your-zai-key-here"
  # Optional per-provider model overrides; omit to use the defaults in
  # atlas/crew/providers.py (_DEFAULT_MODELS).
  # openrouter_model: "vendor/model-slug:free"
