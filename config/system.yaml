# system.yaml â€” RUNTIME MODE, BROKER SELECTION, CAPABILITY GATES
# Read by the Orchestrator. Going LIVE is a deliberate human edit here, never automatic.
# Doc: docs/02_system_architecture.md, docs/09_validation_and_production.md
version: 0.1

# ---- Mode --------------------------------------------------------------------
mode: live                          # backtest | paper | live   (ARMED 2026-06-23 at user request)
# ARMED for real money. KEY 1 OF 2 â€” real orders ALSO require --broker robinhood_live at launch
# (launch_live_day.ps1 sets it). A sim/paper APP run is now REFUSED while mode=live (revert to run sim).

phase_gates:
  paper_min_days: 20                # trading sessions of clean shadow/paper before micro-live
  require_zero_risk_breaches: true
  require_recovery_test: true       # must prove crash-mid-trade reconciliation
  require_compaction_test: true     # must prove rotating-analyst defense under real compaction
  require_human_journal_review: true

# ---- Models (TWO roles, one GPU, hot-swapped one-at-a-time) -------------------
# Detailed serving (gguf paths, quant, vram, ports, swap policy) lives in config/models.yaml.
models:
  analyst:
    name: GLM-4.7-Flash-local        # Technical Analyst (bull/bear/uncertainty + technical/market/news)
    constitution: ANALYST_CONSTITUTION.md
    output_schema: schemas/analyst_view.schema.json
  auditor:
    name: Qwen3.6-27B-local          # adversarial Risk Auditor (risk_flags + risk_score), different family
    constitution: AUDITOR_CONSTITUTION.md
    output_schema: schemas/auditor_view.schema.json
  serving_config: config/models.yaml
  temperature: 0.0
  seed: 42                          # fixed for reproducibility
  pin_exact_build: true             # log BOTH fingerprints every call; model change = canary-gated deploy
  constrained_decoding: true        # llama.cpp json_schema / Outlines enforce the per-role schemas
  max_proposals_per_cycle: 200      # FLOOD CIRCUIT-BREAKER, *not* a queue cap. The candidate
                                    # picker's min_quality_score (signal_params.yaml) is the real
                                    # throttle â€” tune it with scripts/measure_pipeline.py. This only
                                    # trims (and logs LOUDLY) if the picker returns an absurd number,
                                    # so it never silently starves the models in normal operation
                                    # (measured pass-rate at threshold 55 = ~51/500). (2026-06-22)
  require_auditor: true             # the auditor veto is a REQUIRED gate; never trade analyst-only output
  swap_fail_action: skip_cycle      # analyst load fail -> skip cycle; auditor load fail -> discard proposals

# ---- Decision loop -----------------------------------------------------------
loop:
  cycle_seconds: 120                # decision cadence (minutes, NOT a latency race)
  trade_only_in_session: true       # equities: only place trades 09:30-16:00 ET
  monitor_24_7: true                # the process runs 24/7 even when not trading
  timezone: America/New_York

# ---- Broker adapters (one interface, swappable). Validation code == live code. ----
brokers:
  data_feed: alpaca                 # primary market data
  news_feed: finnhub                # news + earnings calendar
  active_adapter: sim               # sim | alpaca_paper | robinhood_agentic
  adapters:
    sim:
      type: SimBrokerAdapter        # shadow fills vs LIVE data; same code path as live
      models: [slippage, spread, partial_fills, options_assignment_on_expiry]
      # Shadow-fill cost model â€” the live-sim counterpart of the backtest's researched slippage convention
      # (atlas/backtest/bracket_sim.py + engine.py; same knobs/citations as the grid in
      # scripts/slippage_floor_revalidation.py). ALL DEFAULT 0 = optimistic EXACT fills (today's behavior).
      # Set non-zero so `--broker sim` shadow runs reflect realistic costs. Read by app.build_orchestrator.
      #   BUY fills at   ask   + max(ask*entry_bps/1e4,   cents/100)
      #   stop/trail at  level - max(level*stop_bps/1e4,  cents/100)   (take-profit = resting limit, exact)
      #   max_chase_pct: skip an entry when ask > last*(1+max_chase_pct/100) (un-catchable gap-up -> no fill)
      slippage:
        entry_bps: 0.0              # marketable-limit BUY pays up through the ask (basis points)
        stop_bps: 0.0              # triggered stop/trail is a market sell -> fills below the level (bps)
        cents: 0.0                # per-share floor in cents; dominates bps at low price (Path-1 universe)
        max_chase_pct: 0.0         # no-fill collar: drop entries gapping > this % above last (0 = off)
    alpaca_paper:
      type: AlpacaPaperAdapter
      paper: true
      options_level: 3              # validate options here (full L3 multi-leg)
    robinhood_agentic:
      type: RobinhoodAgenticAdapter
      mcp_url: https://agent.robinhood.com/mcp/trading
      auth: oauth                   # OAuth-scoped; isolated agentic sub-account; never sees password
      isolated_account: true
      # robin_stocks legacy adapter is intentionally NOT listed: quarantined fallback only.

# ---- Capability gates (enforced by the Risk Engine on every proposal) --------
capability_gates:
  # Robinhood Agentic is EQUITIES-ONLY at beta (options/crypto "coming soon").
  # Options proposals are routed to alpaca_paper for validation and BLOCKED from any live
  # adapter whose capabilities().options == false OR when equity < options_live_min_equity.
  live_options_requires:
    broker_capability_options: true
    equity_min: 2000                # mirrors risk_limits.options.options_live_min_equity
  live_crypto_enabled: false        # not in scope
  fractional_shares: true           # required for $250 equity sizing

# ---- Safety / ops ------------------------------------------------------------
ops:
  kill_switch_command: flatten_all_and_disable   # human-reachable in seconds
  dead_mans_switch: true
  alert_on: [kill_switch, disabled_review, reconciliation_divergence, repeated_rejects, feed_outage, model_eval_regression, swap_failure, auditor_unavailable, vram_pressure]
  journal_append_only: true
  journal_hash_chain: true
  config_in_version_control: true
