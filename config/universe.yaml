# universe.yaml - TRADABLE UNIVERSE + HARD FILTERS
# Current S&P 500 (~500 liquid names), expanded 2026-06-22 from the 10-name curated set so the
# deterministic picker casts a wide net and the reasoning models get 20-50 setups/day to judge.
# ALL tickers are QUOTED: bare YAML parses ON/NO/YES/TRUE/OFF as booleans (ON = ON Semiconductor).
# Prior 10-name list preserved in universe.curated10.yaml.bak.
version: 0.1

universe_mode: dynamic_screen   # 2026-06-24: broadened from curated_liquid (S&P 500) so the --scanner
