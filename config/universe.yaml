# Phase 2: set `universe_mode: dynamic_screen` to build a large universe from the live US-equity asset
# list filtered to the band below (atlas/collect/universe_screener.py). Needs Alpaca creds. The picker's
# price_band gate + the risk engine remain the hard backstops; this just casts a wide net for best-first.
dynamic_screen:
  min_price: 5.0            # floor: penny/lottery names underperform (MAX effect) + wide spreads
  max_price: 100.0         # whole-share band at ~$292 (was 80 at ~$250); edge re-validated <=$100
  min_avg_dollar_vol_20d: 1000000   # screen floor LOWERED 5M->1M now that the order-time spread gate is
                                    # LIVE (Phase 4): the wide net is admitted; wide-spread names are
                                    # rejected at send + the auditor vetoes gap/halt risk. A ~$100 whole-
                                    # share order absorbs $1M/day trivially (market impact is moot).
  max_symbols: 8000        # cast the wide net; QueueOrganizer best-first + price/risk/spread gates narrow it
  # min_market_cap is NOT applied (no fundamentals feed wired) - price + 20d dollar-volume are the screen.
  exclude_leveraged_etfs: true   # best-effort name match in universe_screener.py
  exclude_otc: true              # exchange != OTC

exclusions:
  no_otc_pink: true
  no_leveraged_inverse_etfs: true
  no_recent_ipo_days: 60
  no_known_hard_to_borrow: true
  earnings_within_days_excluded: 2

