# models.yaml - TWO-MODEL LOCAL SERVING + VRAM SWAP POLICY
# Read by the orchestrator's model layer. The two models share one 24GB GPU and run
# one-at-a-time (combined ~38GB > 24GB), so a single hot-swap per cycle is mandatory.
# Doc: docs/02 §2.3-2.4.
version: 0.1

serving:
  backend: llama-swap                # single-active proxy in front of llama.cpp llama-server
  base_url: http://127.0.0.1:8080    # OpenAI-compatible endpoint the orchestrator calls
  max_loaded_models: 1               # the structural "exactly one resident" invariant
  swap_timeout_seconds: 60
  vram_headroom_gb: 2.0              # require free VRAM >= footprint + this before a load
  swap_fail_action: skip_cycle       # analyst load fail -> skip; auditor load fail -> discard
  parallel: 4                        # concurrent in-flight requests/phase (== llama-server --parallel);
                                     # lets llama.cpp continuous-batch the per-candidate calls (~1.4x measured)
  nvidia_smi_path: nvidia-smi
  cuda_avoid: ["13.2"]               # CUDA 13.2 + llama.cpp emits gibberish on Qwen3.6 - pin 12.x

inference:
  temperature: 0.0
  seed: 42
  max_tokens: 8000                    # Qwen3-30B-A3B auditor is verbose (~5k think tokens) -> needs headroom
  max_retries: 2                      # bounded retry for TRANSIENT request failures - chiefly the cold-start
  retry_backoff_seconds: 1.0          # blip on the FIRST constrained call after a VRAM swap (connection/5xx/
                                      # empty). Deterministic failures (4xx / unparseable output) are NOT retried.
  strip_think: true                  # both are thinking models; strip <think> before JSON parse
  constrained_decoding: true         # json_schema grammar is REQUESTED but llama.cpp does NOT enforce it
                                     # with thinking on (#20345) -> client-side strict validation is the guard
  pin_exact_build: true              # log model fingerprint every call; change = canary-gated deploy

# NOTE (2026-07-11): the analyst/auditor ROLE FRAMING below is EQUITY-ERA LEGACY - the
# two-family adversarial cascade is retired (constitutions → attic/; current AI posture =
# docs/INTELLIGENCE_CHARTER.md). The served model ids + gguf paths stay CURRENT (llama-swap
# serving, ask-local, overnight lab, catalyst tagging use them); only the role names are history.
roles:
  analyst:
    name: GLM-4.7-Flash-local
    served_model_id: glm-4.7-flash
    gguf: C:/models/glm/GLM-4.7-Flash-Q5_K_M.gguf
    quant: Q5_K_M
    vram_estimate_gb: 20.0
    ctx: 8192
    # constitution: archived with the equity system; not shipped in this copy
    output_schema: schemas/analyst_view.schema.json
    fingerprint_expected: null       # set after first canary-gated deploy
  auditor:                           # SWAPPED 2026-06-22: was dense Qwen3.6-27B (~92s/call). The MoE
    name: Qwen3-30B-A3B-Thinking-2507-local   # below is ~2.56x faster, deterministic@temp0, and its
    served_model_id: qwen3-30b-a3b-thinking   # risk_score tracks realized outcomes (validated on the
    gguf: C:/models/qwen30/Qwen3-30B-A3B-Thinking-2507-UD-Q5_K_XL.gguf   # 141-trade forensic ledger).
    quant: UD-Q5_K_XL
    vram_estimate_gb: 20.0             # gate: 20 + 2 headroom = 22 <= 22.99 capacity (24GB - 1 reserve)
    ctx: 16384
    # constitution: archived with the equity system; not shipped in this copy
    output_schema: schemas/auditor_view.schema.json
    fingerprint_expected: null
  scout:                               # real-time pre-screen scouts - the --scout pipeline. Default OFF.
                                       # Behavioral knobs (gate/sources/cross-check) live in config/scout.yaml.
                                       # Model picked by benchmark (scripts/bench_scout_vlm.py, 2026-06-24):
                                       # Qwen2.5-VL-3B beat 7B on speed (205 vs 162 img/min @ conc-2) at EQUAL
                                       # 100% price-read accuracy -> 2 small scouts win.
    modality: vision                   # vision (VLM reads a chart/quote screenshot) | text (fetch page/JSON)
    name: Qwen2.5-VL-3B-Instruct-local
    served_model_ids: [scout-a, scout-b]   # two co-resident instances (llama-swap 'scouts' group)
    gguf: C:/models/scout/Qwen2.5-VL-3B-Instruct-Q4_K_M.gguf
    mmproj: C:/models/scout/mmproj-Qwen2.5-VL-3B-Instruct-f16.gguf   # vision projector (required for the VLM)
    quant: Q4_K_M
    vram_estimate_gb: 4.0              # ~3.5-4 per 3B-VL instance (weights+mmproj+KV); 2 => ~8 of 24 (lots free)
    ctx: 8192
    max_tokens: 256
